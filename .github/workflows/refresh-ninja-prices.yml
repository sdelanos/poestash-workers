name: Refresh Ninja Prices
on:
  schedule:
    # Every 20 minutes — each run fetches all poe.ninja categories and
    # batch-upserts ~40k rows. Completes in ~15 seconds.
    - cron: '*/20 * * * *'
  workflow_dispatch: {}

concurrency:
  group: ninja-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Auto-discovers the PoE 1 leagues poe.ninja currently prices
      # (Standard, Hardcore, the live challenge league + its HC variant) and
      # refreshes each. Follows league rollovers with no workflow edit.
      - name: Refresh ninja prices (auto)
        run: npx tsx src/refresh-ninja-prices.ts auto poe1
