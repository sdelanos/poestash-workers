name: Refresh Cluster Prices
on:
  schedule:
    # Every 6h — each run processes ~2,100 combos before timeout.
    # 4 runs/day covers all ~5,365 combos with room to spare.
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

concurrency:
  group: cluster-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      POE_CLIENT_ID: ${{ secrets.POE_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Refresh cluster prices
        run: npm run refresh:clusters
