name: Refresh Gem Usage
on:
  schedule:
    # Every 6 hours at :15 — poe.ninja's build snapshots refresh slowly
    # (every few hours), so polling more often wastes API calls without
    # giving us fresher data. Each run fetches ~225 KB and writes ~800
    # rows per league.
    - cron: '15 */6 * * *'
  workflow_dispatch: {}

concurrency:
  group: gem-usage-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Discovers the leagues poe.ninja tracks builds for, reduces them to the
      # priced set (Standard + the challenge league and its HC variant), and
      # refreshes each. A missing/low-population snapshot on one league is
      # skipped inside the script; only a genuine poe.ninja outage fails.
      - name: Refresh gem usage (auto)
        run: npx tsx src/refresh-gem-usage.ts
