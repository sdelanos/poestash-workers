name: Refresh Temple Prices
on:
  schedule:
    # Hourly at :30 — each run hits the PoE trade API twice per league
    # (1 search + 1 fetch) for the gem-room t3 pseudo stat. ~8 calls/hour
    # total across the 4 leagues, well under the 30/300s ceiling.
    - cron: '30 * * * *'
  workflow_dispatch: {}

concurrency:
  group: temple-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      POE_CLIENT_ID: ${{ secrets.POE_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Prices every PoE 1 league the ninja worker currently tracks (read from
      # ninja_price_meta): Standard, Hardcore, the live challenge league + its
      # HC variant. Follows league rollovers with no workflow edit.
      - name: Refresh temple prices (auto)
        run: npx tsx src/refresh-temple-prices.ts
