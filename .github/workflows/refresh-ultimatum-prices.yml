name: Refresh Ultimatum Prices
on:
  schedule:
    # Hourly at :45 — each run fetches Inscribed Ultimatum prices from poe.watch
    # and batch-upserts ~4k rows per league.
    - cron: '45 * * * *'
  workflow_dispatch: {}

concurrency:
  group: ultimatum-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Discovers the priced set from poe.watch (Standard, Hardcore, the live
      # challenge league + its HC variant) and refreshes each. Follows league
      # rollovers with no workflow edit; a league poe.watch hasn't indexed is
      # skipped, and only a genuine poe.watch outage fails the run.
      - name: Refresh ultimatum prices (auto)
        run: npx tsx src/refresh-ultimatum-prices.ts
